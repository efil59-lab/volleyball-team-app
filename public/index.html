<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a237e" />
    <meta
      name="description"
      content="אפליקציית ניהול קבוצת כדורשת"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      שחזור קבוצה ל-PWA: כשמתקינים את האפליקציה למסך הבית, ה-start_url במניפסט הוא "."
      (כתובת חשופה, בלי ?team=). הסקריפט הבא רץ לפני טעינת האפליקציה: אם הכתובת הנוכחית
      חסרת ?team= אבל יש קבוצה שמורה מביקור קודם — הוא מוסיף את ה-?team= מיד.
      כך PWA שנפתח מהאייקון מגיע ישירות לקבוצה הנכונה, באייפון ובאנדרואיד כאחד.
      שמירת הקבוצה עצמה (pwaTeam) נעשית באפליקציה רק כשנכנסים עם ?team= מפורש.
    -->
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          if (!params.get("team")) {
            var saved = localStorage.getItem("pwaTeam");
            if (saved) {
              var sep = window.location.search ? "&" : "?";
              var newUrl = window.location.pathname + window.location.search + sep + "team=" + encodeURIComponent(saved) + window.location.hash;
              window.location.replace(newUrl);
            }
          }
        } catch (e) { /* אם משהו נכשל - ממשיכים רגיל לדף הנחיתה */ }
      })();
    </script>
    <title>קבוצת הכדורשת</title>
  </head>
  <body>
    <noscript>יש להפעיל JavaScript כדי להשתמש באפליקציה.</noscript>
    <div id="root"></div>
  </body>
</html>
